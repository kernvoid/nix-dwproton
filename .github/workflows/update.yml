name: Update dwproton

on:
  # Weekly, Sunday 00:00 UTC
  # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#schedule
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run update script
        run: nix run .#update-dwproton

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- pkgs/dwproton-bin/default.nix; then
            echo "no update, nothing to push"
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dwproton-bin
        if: steps.changes.outputs.updated == 'true'
        run: nix build .#dwproton-bin -L

      - name: Commit and push
        if: steps.changes.outputs.updated == 'true'
        run: |
          NEW_VERSION=$(nix eval --raw .#dwproton-bin.version)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pkgs/dwproton-bin/default.nix
          git commit -m "dwproton: bump to $NEW_VERSION"
          git push origin HEAD:main
